om staying merely informational. Neither was meant to stand alone.","And then, when the responding is done, comes the hardest movement of all: stay. Not because there is one more task to complete, but because the whole point was never completion — it was gladness in Him. Some mornings the gladness comes quickly and the staying is brief. Some mornings the staying is the entire work, going back through the steps with a heart that warms a degree at a time. The temptation is always to leave the moment I have technically done something — read a chapter, said a prayer, checked the box. But the man who learns to stay discovers, slowly, that the same space which once felt like an effort to clear begins to feel like home. Wait for the Lord, the Psalmist says, be strong, and let your heart take courage; wait for the Lord. The waiting is not wasted time before the real thing. The waiting is the thing."],"trails":[{"ref":"Philippians 4:4–9  |  Psalm 5:1–8","q":"Paul turns everything into prayer; David lays his requests before God and watches. Am I responding to what God says, or just completing two separate tasks?"},{"ref":"Psalm 27:7–14  |  Lamentations 3:24–26","q":"Wait for the Lord; it is good to wait quietly. When do I tend to leave — the moment I have technically done something, or when my soul is actually glad?"},{"ref":"Nehemiah 1:4–11  |  Daniel 9:1–4","q":"Both men recalled God’s Word and immediately prayed it back. What would it look like to pray today’s passage straight back to God?"}]},{"n":27,"title":"The Fruit Is His to Grow","quest":["The instinct after reading a framework like PRESS is to think: if I do these five things consistently, I will produce the results. That instinct is wrong.","The fruit of the Spirit. Not the fruit of the method. The Spirit produces this through a life connected to the vine, fed by the Spirit, abiding in the One who is the source of all of it."],"question":"Am I treating the fruit of the Spirit as a self-improvement list I produce by effort — or am I trusting the Spirit to grow it through circumstances I did not choose?","devotional":["The moment a man learns a good spiritual framework, a subtle error stands ready: the assumption that if he runs the framework faithfully, he will manufacture the results. Do the five steps, produce the fruit. But Paul calls it the fruit of the Spirit, not the fruit of the method and not the fruit of the man’s effort — and the distinction is not a technicality. A method I run produces what I can produce. The Spirit produces what only God can grow: love that outlasts being unloved, joy that survives loss, patience that holds when patience has every reason to break. No discipline manufactures those. They grow on a branch that abides, by the life of a vine the branch does not supply.","And here is how the Spirit actually grows them, which is the part I would never design for myself: not by handing me easier days, but by ordaining exactly the circumstances the fruit requires. He grows patience by placing me where patience costs something. He grows love by giving me people who are hard to love. Paul says we rejoice in our sufferings, knowing that suffering produces endurance, and endurance character, and character hope — a chain in which the hard thing is not the obstacle to the fruit but the means of it. This reframes the whole of an ordinary, difficult life. The interruption, the disappointment, the person I cannot fix, the season that will not break — these are not in the way of the fruit. In the hands of the Spirit, they are how it grows. My job was never to manufacture the harvest. It was to abide, and to trust the Gardener with the weather."],"trails":[{"ref":"Galatians 5:16–25  |  John 15:1–8","q":"The fruit is the Spirit’s, grown through abiding. What am I trying to produce in my own strength that I should be receiving from Him?"},{"ref":"Romans 5:1–5  |  James 1:2–4","q":"Suffering produces endurance, character, hope; testing produces completeness. What circumstance am I resenting that may be exactly how God is growing something in me?"},{"ref":"Philippians 1:6  |  2 Corinthians 3:18","q":"He who began a good work will complete it; we are transformed degree by degree. Where am I impatient with growth that God is handling on His timeline, not mine?"}]},{"n":28,"title":"The Anchor Holds","quest":["God’s blessed response could be silence. The anchor holds even then.","Hebrews calls hope an anchor for the soul, sure and steadfast. Not an anchor that only holds in calm water. An anchor that holds in the storm, secured to something the storm cannot reach."],"question":"Is my assurance in God settled — anchored to something the storm cannot reach — or contingent on the circumstances cooperating?","devotional":["Hebrews gives hope an image that only makes sense in bad weather: an anchor for the soul, sure and steadfast. No one thinks about the anchor when the sea is glass. The anchor is for the storm — and the writer specifies that this one reaches into the inner place behind the curtain, where Christ has gone. That is the whole point. The thing the anchor is secured to is not down in the shifting seabed of my circumstances; it is fixed in the one place the storm cannot reach, behind the curtain, anchored to the unchangeable character of God and the work of Christ already finished there. The storm can be as violent as it likes. It cannot reach the thing the line is tied to.","Spurgeon, who preached through a depression that never fully left him, knew assurance could not be a feeling, because feelings are the most storm-tossed things a man owns. Assurance is a settled conviction about who God is that does not require the circumstances to cooperate and does not rise and fall with the barometer of my mood. This is why God’s response can be silence and the anchor still holds. I am not pressing in to secure a feeling I can point to as proof. I am pressing in because the One I am anchored to is faithful whether or not He speaks on my timeline, and His silence is not the slipping of the anchor — it is the storm doing its work on a line that will not break. The vision is fixed even when the terrain goes dark. The anchor was never set in the weather."],"trails":[{"ref":"Hebrews 6:13–20  |  Psalm 46:1–11","q":"The anchor reaches behind the curtain, where the storm cannot follow; God is a refuge in trouble. What is my assurance actually anchored to — God, or my circumstances?"},{"ref":"Romans 8:31–39  |  2 Timothy 1:12","q":"Nothing can separate us; Paul knew whom he had believed. Is my confidence in how I feel, or in who God is?"},{"ref":"Lamentations 3:19–26  |  Psalm 42:5–11","q":"Hope rests on mercies new every morning, not on the storm clearing. Where am I waiting for the weather to change before I will trust?"}]},{"n":29,"title":"The Drift Check","quest":["C.S. Lewis wrote that the prayer preceding all prayers is: may it be the real I who speaks, may it be the real Thou that I speak to. That is the drift check in one line.","Only God and I know the real state of my heart. These questions are not for anyone else."],"question":"Is the ache to know God growing or shrinking? Am I hungrier for Him than I was a month ago — and am I willing to hear the honest answer?","devotional":["C.S. Lewis said the prayer that ought to precede all prayers is, may it be the real I who speaks, may it be the real Thou that I speak to — and that single sentence is the whole drift check. Because drift does not announce itself. It is perfectly possible to keep the form of devotion intact while the reality quietly drains out of it, to say the words to a God I am no longer actually addressing, as the version of myself I am no longer actually being. The check is not a performance review or a spiritual scorecard. It is an invitation to bring the real self before the real God and let that honest exposure do what it does.","The questions are simple and they are only for God and me: When did I last feel genuine gladness in Him, not relief at finishing? What has been occupying the center of my affections this week? Is the ache to know Him growing or shrinking? And the most revealing test is not the answer but the willingness to ask at all — because if I rush past these, the rushing is itself the answer. A man who is drifting does not want to stop and check the heading; the not-wanting is the symptom. The grace of the drift check is that it gets answered before things go far, and the God who searches the heart is not searching it to condemn but to draw the drifting man back. The point was never to measure how far I have come. It was to notice, honestly, which direction I am currently facing — while the correction is still small."],"trails":[{"ref":"Psalm 139:23–24  |  Lamentations 3:40–42","q":"David asks God to search him; Jeremiah says let us examine our ways and return. Am I willing to be honestly searched right now — or am I avoiding the question?"},{"ref":"Revelation 2:1–5  |  2 Corinthians 13:5","q":"The Ephesians did everything right but left their first love. Have I kept the form while losing the affection?"},{"ref":"Haggai 1:5–7  |  Psalm 1:1–3","q":"Consider your ways: you sow much and harvest little. Is the ache for God growing or shrinking — and what is the honest evidence?"}]},{"n":30,"title":"The River Feeds Everyone Downstream","quest":["I cannot give what I am not receiving. And I will not receive if I am not pursuing. A well being deepened overflows. A river being fed runs strong.","I press in for myself. I press in for them. The river that feeds me is the river that feeds everyone downstream."],"question":"Is what I am giving the people closest to me coming from a well being deepened — or am I drawing on stored water from encounters with God that are further and further in the past?","devotional":["The overflow is not a second project added on to the quest for joy. It is what the quest produces when it is real. A well being deepened overflows; a river being fed runs strong, and runs to everyone downstream without being told to. The Quest is honest about both directions of this: I cannot give what I am not receiving, and I will not receive if I am not pursuing. The order is fixed and it cannot be cheated. The most dangerous version of ministry, leadership, fathering, teaching, is the one where I mistake the output for the source and keep drawing on yesterday’s encounter to fund today’s giving — distributing water from a well I have quietly stopped digging.","This is the reason the pressing in is not selfish, and it dissolves the false choice between pursuing God for my own soul and pouring out for others. They are the same act. Paul says we comfort others with the comfort we ourselves have received from God — the comfort flows out because it first flowed in, and it cannot flow out if it never flowed in. The people downstream are drinking from what God is doing upstream in me. So the deepest thing I can do for everyone I am called to love is the thing that looks, from the outside, like the most private: go to the Source, get fed, get glad in God, and let the overflow find them. The river that feeds me is the river that feeds them. And the quest does not end. It is not a guide I complete. It is a path I enter, every morning, as long as it takes — because He is the treasure, and the man who finds God sufficient has found the only thing that is."],"trails":[{"ref":"John 7:37–39  |  2 Corinthians 1:3–7","q":"Rivers flow out of the one who comes to Christ; we comfort others with the comfort we received. Is my overflow coming from a current source, or from stored water running low?"},{"ref":"Psalm 1:1–3  |  Ezekiel 47:1–12","q":"The fed tree yields fruit in season; the river deepens as it flows and brings life wherever it goes. What would deepen in the people around me if I went deeper at the Source?"},{"ref":"2 Timothy 1:6–7  |  John 15:9–11","q":"Fan into flame the gift; abide so His joy may be in you and your joy complete. Am I tending the fire at the source, or only managing what is already burning low?"}]}];
const PRESS = [{"letter":"P","name":"Pour Out","directive":"Bring what is actually there, not what you think should be there.","verse":"“Pour out your heart before Him; God is a refuge for us.”","ref":"Psalm 62:8","body":"Before anything else, bring what is actually in you. The cold heart. The distracted mind. The unfinished worries. He already knows. Coming honestly is the first act of trust."},{"letter":"R","name":"Remember","directive":"Before I bring my needs, I bring my worship.","verse":"“Bless the LORD, O my soul, and all that is within me, bless His holy name. Forget none of His benefits.”","ref":"Psalm 103:1–2","body":"A Psalm. A hymn. One truth about who He is, held before everything else. Worship is not the warm-up. It is the orientation that makes everything after it right."},{"letter":"E","name":"Eat","directive":"Read to find Him, not to finish.","verse":"“Your words were found and I ate them, and Your words became for me a joy and the delight of my heart.”","ref":"Jeremiah 15:16","body":"Stay where something moves. Ask why it moves you. Not information, but encounter. Increased clarity, stronger desire, depth of peace, truth pressing on the heart, sin convicting, internal steadiness, real gladness, great joy. The response is His to give."},{"letter":"S","name":"Speak","directive":"Let what I just read become what I say back to Him.","verse":"“In everything by prayer and petition with thanksgiving let your requests be made known to God.”","ref":"Philippians 4:6","body":"Respond to what He just said. Worship what His character reveals. Confess what it exposes. Ask for what it promises. The Word and prayer are one conversation."},{"letter":"S","name":"Stay","directive":"Don’t leave when I have technically done something.","verse":"“Wait for the LORD; be strong and let your heart take courage; yes, wait for the LORD.”","ref":"Psalm 27:14","body":"Stay until the heart is actually glad in Him. Go back through P–R–E–S again if needed, each time with a heart that is a little warmer. The man who learns to stay is the man who eventually finds that the same space that once required clearing begins to feel like home."}];

// ── State ──────────────────────────────────────────────────
const SK_DAY    = 'qfj_day';
const SK_CHECKS = 'qfj_checks';
const SK_NOTES  = 'qfj_notes';

function loadNum(k, def) { try { const v = localStorage.getItem(k); return v === null ? def : parseInt(v, 10); } catch(e){ return def; } }
function saveNum(k, v)   { try { localStorage.setItem(k, v); } catch(e){} }
function loadObj(k)      { try { return JSON.parse(localStorage.getItem(k) || '{}'); } catch(e){ return {}; } }
function saveObj(k, v)   { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }

let curDay  = loadNum(SK_DAY, 0);
let checks  = loadObj(SK_CHECKS);
let notes   = loadObj(SK_NOTES);
let noteTimers = {};

// ── Helpers ────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function checksKey(d, t) { return d + '-' + t; }

function getChecks(d, t) {
  const k = checksKey(d, t);
  if (!checks[k]) checks[k] = [false,false,false,false];
  return checks[k];
}

function getNote(d, t) { return notes[checksKey(d,t)] || ''; }

function dayHasProgress(d) {
  for (let t = 0; t < 3; t++) {
    const c = checks[checksKey(d,t)];
    if (c && c.some(Boolean)) return true;
  }
  return false;
}

function countChecks(d) {
  let n = 0;
  for (let t = 0; t < 3; t++) {
    const c = checks[checksKey(d,t)];
    if (c) c.forEach(v => v && n++);
  }
  return n;
}

// ── Panel switching ────────────────────────────────────────
function switchPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (id === 'days') renderDaysList();
}

// ── Day rendering ──────────────────────────────────────────
function renderDay(idx) {
  const d = DAYS[idx];
  const scroll = document.getElementById('day-scroll');

  let html = '';
  html += '<div class="day-num">Day ' + (idx+1) + (d.isNew ? ' &nbsp;<span style="background:var(--gold);color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;">NEW</span>' : '') + '</div>';
  html += '<div class="day-title">' + esc(d.title) + '</div>';
  html += '<hr class="gold-rule">';

  // From The Quest
  html += '<div class="sec-label">From The Quest</div>';
  html += '<div class="quest-block">';
  d.quest.forEach(p => { html += '<p class="quest-para">' + esc(p) + '</p>'; });
  if (d.questHeading) html += '<p class="quest-heading">' + esc(d.questHeading) + '</p>';
  html += '</div>';

  // Question (top)
  html += renderQuestion(d.question);

  // Devotional
  html += '<div class="sec-label">Devotional</div>';
  d.devotional.forEach(p => { html += '<p class="devot-para">' + esc(p) + '</p>'; });

  // Question (bottom, identical)
  html += renderQuestion(d.question);

  // Trails
  html += '<div class="sec-label" style="margin-top:8px;">The Trails</div>';
  html += '<div class="trails-wrap">';
  d.trails.forEach((trail, ti) => {
    const c = getChecks(idx, ti);
    const note = getNote(idx, ti);
    html += '<div class="trail-block">';
    html += '<div class="trail-num">Trail ' + (ti+1) + '</div>';
    html += '<div class="trail-ref">' + esc(trail.ref) + '</div>';
    html += '<div class="trail-q">' + esc(trail.q) + '</div>';
    html += '<textarea class="trail-textarea" placeholder="Write your answer here…" id="note-' + idx + '-' + ti + '" oninput="scheduleNoteSave(' + idx + ',' + ti + ')">' + esc(note) + '</textarea>';
    html += '<div class="cycles-row">';
    html += '<span class="cycles-label">Cycle</span>';
    for (let ci = 0; ci < 4; ci++) {
      html += '<button class="cycle-btn' + (c[ci] ? ' on' : '') + '" onclick="toggleCheck(' + idx + ',' + ti + ',' + ci + ')" aria-label="Cycle ' + (ci+1) + '">' + (ci+1) + '</button>';
    }
    html += '</div></div>';
  });
  html += '</div>';

  scroll.innerHTML = html;
  scroll.scrollTop = 0;

  // Update header/nav
  document.getElementById('hdr-pos').textContent = 'Day ' + (idx+1) + '\u00a0/\u00a030';
  document.getElementById('nav-count').textContent = (idx+1) + ' / 30';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === DAYS.length - 1;
}

function renderQuestion(q) {
  return '<div class="q-block"><span class="q-arrow">→</span><span class="q-text">' + esc(q) + '</span></div>';
}

// ── Navigation ─────────────────────────────────────────────
function shiftDay(dir) {
  const next = curDay + dir;
  if (next < 0 || next >= DAYS.length) return;
  curDay = next;
  saveNum(SK_DAY, curDay);
  renderDay(curDay);
}

function goToDay(idx) {
  curDay = idx;
  saveNum(SK_DAY, curDay);
  renderDay(curDay);
  // Switch to today panel
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-today').classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
}

// ── Checks ─────────────────────────────────────────────────
function toggleCheck(dayIdx, trailIdx, cycleIdx) {
  const c = getChecks(dayIdx, trailIdx);
  c[cycleIdx] = !c[cycleIdx];
  checks[checksKey(dayIdx, trailIdx)] = c;
  saveObj(SK_CHECKS, checks);
  // Update button appearance without full re-render
  const btns = document.querySelectorAll('.trail-block');
  if (btns[trailIdx]) {
    const cycleBtns = btns[trailIdx].querySelectorAll('.cycle-btn');
    if (cycleBtns[cycleIdx]) {
      cycleBtns[cycleIdx].classList.toggle('on', c[cycleIdx]);
    }
  }
}

// ── Notes ──────────────────────────────────────────────────
function scheduleNoteSave(dayIdx, trailIdx) {
  const key = checksKey(dayIdx, trailIdx);
  clearTimeout(noteTimers[key]);
  noteTimers[key] = setTimeout(() => {
    const el = document.getElementById('note-' + dayIdx + '-' + trailIdx);
    if (el) {
      notes[key] = el.value;
      saveObj(SK_NOTES, notes);
    }
  }, 800);
}

// ── Days List ──────────────────────────────────────────────
function renderDaysList() {
  const container = document.getElementById('days-list');
  let html = '';
  DAYS.forEach((d, idx) => {
    const checked = countChecks(idx);
    const isCur = idx === curDay;
    html += '<div class="day-row' + (isCur ? ' current-day' : '') + '" onclick="goToDay(' + idx + ')">';
    html += '<div class="dr-num">Day ' + (idx+1) + '</div>';
    html += '<div class="dr-title">' + esc(d.title) + '</div>';
    if (d.isNew) html += '<div class="dr-new">NEW</div>';
    // 3 dots for 3 trails: lit if any cycle box checked for that trail
    html += '<div class="dr-progress">';
    for (let t = 0; t < 3; t++) {
      const c = checks[checksKey(idx,t)];
      const on = c && c.some(Boolean);
      html += '<div class="dr-dot' + (on ? ' on' : '') + '"></div>';
    }
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

// ── PRESS ──────────────────────────────────────────────────
function renderPress() {
  let html = '';
  html += '<div class="press-top-label">Making the Soul Happy in God</div>';
  html += '<div class="press-page-title">PRESS</div>';
  html += '<div class="press-page-sub">The First Work of Every Day &mdash; The five movements of the morning</div>';
  PRESS.forEach(step => {
    html += '<div class="press-step">';
    html += '<div class="ps-letter">' + esc(step.letter) + '</div>';
    html += '<div class="ps-name">' + esc(step.name) + '</div>';
    html += '<div class="ps-directive">' + esc(step.directive) + '</div>';
    html += '<div class="ps-verse"><div class="ps-verse-text">' + esc(step.verse) + '</div></div>';
    html += '<div class="ps-verse-ref">' + esc(step.ref) + '</div>';
    html += '<div class="ps-body">' + esc(step.body) + '</div>';
    html += '</div>';
  });
  html += '<div class="press-goal">Did I leave with my soul more glad in God than when I arrived?<br><strong>The goal is not completion. It is gladness in Him.</strong></div>';
  document.getElementById('press-inner').innerHTML = html;
}

// ── Init ───────────────────────────────────────────────────
if (curDay >= DAYS.length) curDay = 0;
renderDay(curDay);
renderPress();
</script>
</body>
</html>
